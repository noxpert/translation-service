[tool.pytest.ini_options]
asyncio_mode = "strict"

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I"]  # pycodestyle errors, pyflakes, isort

[tool.ruff.lint.per-file-ignores]
"app/services/ollama.py" = ["E501"]  # prompt template contains long prose lines

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
disallow_untyped_defs = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
# SQLAlchemy classical Column() style produces false positives — models are pure ORM boilerplate
module = ["app.models.*"]
ignore_errors = true

[[tool.mypy.overrides]]
# Column descriptor assignments (e.g. word.notes = "x") are valid at runtime via SQLAlchemy
module = ["app.services.*"]
ignore_errors = true

[[tool.mypy.overrides]]
# FastAPI router functions are typed via response_model, not return annotations
module = ["app.routers.*", "app.main"]
disallow_untyped_defs = false
