services:
  translation-service:
    build: .
    container_name: translation-service
    ports:
      - "${PORT:-8081}:${PORT:-8081}"
    volumes:
      - ./data:/data
    environment:
      - PORT=${PORT:-8081}
      - DATABASE_URL=sqlite:////data/translations.db
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-translategemma:27b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
