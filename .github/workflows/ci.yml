name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Builds the image and caches layers in GitHub Actions cache.
      # The tag matches what docker compose derives from the project + service name
      # so the subsequent `docker compose run --no-build` reuses this image directly.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: translation-service-translation-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests
        run: |
          docker compose run --rm --no-build \
            -e DATABASE_URL=sqlite:// \
            -e PYTHONPATH=/app \
            translation-service \
            pytest tests/ -v
