name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Type check (mypy)
        run: mypy app/

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Builds the image and caches layers in GitHub Actions cache.
      # The tag matches what docker compose derives from the project + service name
      # so the subsequent docker run reuses this image directly.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: translation-service-translation-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests
        run: |
          docker run --rm \
            -e DATABASE_URL=sqlite:// \
            -e PYTHONPATH=/app \
            translation-service-translation-service:latest \
            pytest tests/ -v
